<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#B3E5FC" />
    <title>Crystal Kingdom Defenders</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Quicksand:wght@500;700&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --sky: #b3e5fc;
        --plum: #4a148c;
      }
      * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: linear-gradient(180deg, #b3e5fc 0%, #c8e6c9 100%);
        font-family: 'Quicksand', 'Helvetica Neue', sans-serif;
        color: #424242;
        user-select: none;
        -webkit-user-select: none;
      }
      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      #game-container canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
        box-shadow: 0 12px 40px rgba(74, 20, 140, 0.25);
        border-radius: 12px;
      }
      #loading {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-family: 'Fredoka', sans-serif;
        font-weight: 700;
        font-size: 28px;
        color: var(--plum);
        text-align: center;
      }
      #loading .pulse {
        display: inline-block;
        animation: bounce 1.2s ease-in-out infinite;
      }
      @keyframes bounce {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-12px);
        }
      }
    </style>
  </head>
  <body>
    <div id="loading">
      <div class="pulse">✨ Loading Crystal Kingdom... ✨</div>
    </div>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>

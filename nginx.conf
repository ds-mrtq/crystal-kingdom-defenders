# Security headers macro — must be re-included in any location block that
# adds its own add_header directive (nginx does NOT inherit add_header).
# Loaded from /etc/nginx/conf.d/default.conf

map $sent_http_content_type $ckd_security_csp {
    default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob:; media-src 'self' blob:; connect-src 'self'; worker-src 'self' blob:;";
}

server {
    listen       8080;
    listen  [::]:8080;
    server_name  _;
    server_tokens off;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml;

    # ---- Cache: hashed assets ----
    location /assets/ {
        add_header X-Frame-Options          "SAMEORIGIN"                 always;
        add_header X-Content-Type-Options   "nosniff"                    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "interest-cohort=()"         always;
        add_header Content-Security-Policy  $ckd_security_csp            always;
        add_header Cache-Control            "public, immutable, max-age=31536000" always;
        try_files $uri =404;
    }

    # ---- Cache: images / fonts ----
    location ~* \.(?:png|jpg|jpeg|gif|webp|svg|ico|woff2?|ttf|otf|eot)$ {
        add_header X-Frame-Options          "SAMEORIGIN"                 always;
        add_header X-Content-Type-Options   "nosniff"                    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "interest-cohort=()"         always;
        add_header Cache-Control            "public, max-age=2592000"    always;
        try_files $uri =404;
    }

    # ---- Don't cache HTML so user always gets latest hash references ----
    location = /index.html {
        add_header X-Frame-Options          "SAMEORIGIN"                 always;
        add_header X-Content-Type-Options   "nosniff"                    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "interest-cohort=()"         always;
        add_header Content-Security-Policy  $ckd_security_csp            always;
        add_header Cache-Control            "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # ---- SPA fallback — any unknown route serves index.html ----
    location / {
        add_header X-Frame-Options          "SAMEORIGIN"                 always;
        add_header X-Content-Type-Options   "nosniff"                    always;
        add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy       "interest-cohort=()"         always;
        add_header Content-Security-Policy  $ckd_security_csp            always;
        try_files $uri $uri/ /index.html;
    }

    # ---- Hide hidden files ----
    location ~ /\. {
        deny all;
        return 404;
    }
}
